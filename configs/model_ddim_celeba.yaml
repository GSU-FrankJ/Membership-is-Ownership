# DDIM model config for CelebA (64x64)
# Scaled architecture for face generation

experiment:
  name: ddim_celeba
  output_dir: /data/short/fjiang4/mia_ddpm_qr/runs/ddim_celeba  # Use existing checkpoints
  resume: null

model:
  channels: 128
  channel_mults: [1, 2, 2, 2, 4]  # Extra level for 64x64
  num_res_blocks: 2
  attention_resolutions: [16, 8]  # Attention at 16x16 and 8x8
  dropout: 0.0
  in_channels: 3
  out_channels: 3
  # Resolution: 64 -> 32 -> 16 -> 8 -> 4 (5 downsamples)
  image_size: 64

diffusion:
  timesteps: 1000
  schedule: cosine
  ddim_eta: 0.0

training:
  iterations:
    main: 400000
    fastdev: 100000
  batch_size: 64  # Smaller batch due to larger images
  lr: 0.0002
  weight_decay: 0.0
  optimizer: adamw
  betas: [0.9, 0.999]
  grad_clip: 1.0
  ema_decay: 0.9999
  ema_update_every: 1
  amp: true
  log_interval: 500
  checkpoint_interval: 10000
  fastdev_limit: 2000

data:
  config: configs/data_celeba.yaml

seed: 20251030

# Baseline model registry by dataset
# Maps each dataset to its relevant public baseline models for ownership comparison
# Each baseline has a 'role' annotation:
#   matched      — trained on the same or very similar domain
#   near_matched — same resolution, overlapping classes
#   mismatched   — trained on an unrelated domain
#   lower_bound  — untrained random model (maximum expected t-error)

# CIFAR-10 (32x32) - Reference dataset
cifar10:
  - name: ddpm-cifar10
    model_id: google/ddpm-cifar10-32
    resolution: 32
    type: ddpm
    role: matched
    description: "DDPM trained on CIFAR-10 (native resolution match)"
  - name: ddpm-bedroom
    model_id: google/ddpm-ema-bedroom-256
    resolution: 256
    type: ddpm
    role: mismatched
    description: "DDPM trained on LSUN Bedrooms (domain-mismatched, 256->32 resize)"
  - name: random-32
    resolution: 32
    type: random
    role: lower_bound
    description: "Randomly initialized UNet (untrained lower bound)"

# CIFAR-100 (32x32) - Same resolution as CIFAR-10, overlapping classes
cifar100:
  - name: ddpm-cifar10
    model_id: google/ddpm-cifar10-32
    resolution: 32
    type: ddpm
    role: near_matched
    description: "DDPM trained on CIFAR-10 (same resolution, 10/100 class overlap)"
  - name: ddpm-bedroom
    model_id: google/ddpm-ema-bedroom-256
    resolution: 256
    type: ddpm
    role: mismatched
    description: "DDPM trained on LSUN Bedrooms (domain-mismatched, 256->32 resize)"
  - name: random-32
    resolution: 32
    type: random
    role: lower_bound
    description: "Randomly initialized UNet (untrained lower bound)"

# STL-10 (96x96) - Natural objects, same 10 classes as CIFAR-10
stl10:
  - name: ddpm-cifar10
    model_id: google/ddpm-cifar10-32
    resolution: 32
    type: ddpm
    role: matched
    description: "DDPM trained on CIFAR-10 (same 10 classes, 32->96 resize)"
  - name: ddpm-church
    model_id: google/ddpm-ema-church-256
    resolution: 256
    type: ddpm
    role: mismatched
    description: "DDPM trained on LSUN Churches (domain-mismatched, 256->96 resize)"
  - name: ddpm-bedroom
    model_id: google/ddpm-ema-bedroom-256
    resolution: 256
    type: ddpm
    role: mismatched
    description: "DDPM trained on LSUN Bedrooms (domain-mismatched, 256->96 resize)"
  - name: random-96
    resolution: 96
    type: random
    role: lower_bound
    description: "Randomly initialized UNet (untrained lower bound)"

# CelebA (64x64) - Face-specific baselines
celeba:
  - name: ddpm-celebahq
    model_id: google/ddpm-celebahq-256
    resolution: 256
    type: ddpm
    role: matched
    description: "DDPM trained on CelebA-HQ faces (domain-matched, 256->64 resize)"
  - name: ldm-celebahq
    model_id: CompVis/ldm-celebahq-256
    resolution: 256
    type: ldm
    role: matched
    description: "Latent Diffusion on CelebA-HQ (domain-matched, different architecture)"
  - name: ddpm-bedroom
    model_id: google/ddpm-ema-bedroom-256
    resolution: 256
    type: ddpm
    role: mismatched
    description: "DDPM trained on LSUN Bedrooms (domain-mismatched, 256->64 resize)"
  - name: random-64
    resolution: 64
    type: random
    role: lower_bound
    description: "Randomly initialized UNet (untrained lower bound)"

# Default normalization parameters per model type
model_defaults:
  ddpm:
    # Most HuggingFace DDPM models expect [-1, 1] input
    normalization:
      mean: [0.5, 0.5, 0.5]
      std: [0.5, 0.5, 0.5]
  ldm:
    # LDM typically uses same normalization
    normalization:
      mean: [0.5, 0.5, 0.5]
      std: [0.5, 0.5, 0.5]
